<!DOCTYPE html>
<html>
<head>
    <title>Vanilla Minecraft Server</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e234f, #11142b);
    color: white;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    margin-bottom: 30px;
}

h1 { color: #4CAF50; }

.status-line { font-size: 20px; margin: 20px 0; }

.dot {
    height: 14px;
    width: 14px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    animation: pulse 1.5s infinite;
}

.green { background:#4CAF50; box-shadow:0 0 10px #4CAF50; }
.red { background:#f44336; box-shadow:0 0 10px #f44336; }
.yellow { background:#ff9800; box-shadow:0 0 10px #ff9800; }

@keyframes pulse {
    0%{transform:scale(1);opacity:1;}
    50%{transform:scale(1.3);opacity:0.7;}
    100%{transform:scale(1);opacity:1;}
}

button {
    padding: 12px 24px;
    font-size: 16px;
    cursor: pointer;
    margin: 8px;
    border: none;
    border-radius: 8px;
    transition: 0.2s ease;
}

.copy-btn { background:#4CAF50;color:white; }
.start-btn { background:#ff9800;color:white; }

button:hover { transform: scale(1.05); }

.record { margin-top:10px;color:gold;font-size:18px; }
.join-counter { margin-top:5px;color:#90caf9;font-size:16px; }

.chart-wrapper { height:260px; }

footer {
    text-align:center;
    padding:20px;
    color:#aaa;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Vanilla Minecraft Server</h1>

<p><strong>Server IP:</strong> vanillaminecraftsrv.falixsrv.me</p>
<p><strong>Version:</strong> <span id="version">Loading...</span></p>

<button class="copy-btn" onclick="copyIP()">Copy IP</button>

<a id="startButton"
   href="https://falixnodes.net/startserver?ip=vanillaminecraftsrv.falixsrv.me"
   target="_blank"
   rel="noopener noreferrer">
    <button class="start-btn">Start the Server</button>
</a>

<div class="status-line" id="statusLine">
    Checking server status...
</div>

<div class="record">
🏆 Peak Players: <span id="peak">0</span>
</div>

<div class="join-counter">
📅 Daily Joins: <span id="joins">0</span>
</div>

</div>

<div class="card">
<h3>Live Player Graph</h3>
<div class="chart-wrapper">
<canvas id="liveChart"></canvas>
</div>
</div>

<div class="card">
<h3>24 Hour History</h3>
<div class="chart-wrapper">
<canvas id="historyChart"></canvas>
</div>
</div>

</div>

<footer>
© 2026 Vanilla Minecraft Server
</footer>

<script>
const serverIP = "vanillaminecraftsrv.falixsrv.me";

let peakPlayers = localStorage.getItem("peakPlayers") || 0;
let totalJoins = localStorage.getItem("dailyJoins") || 0;
let lastPlayerCount = 0;

document.getElementById("peak").textContent = peakPlayers;
document.getElementById("joins").textContent = totalJoins;

// HISTORY STORAGE (24h rolling)
let historyData = JSON.parse(localStorage.getItem("historyData")) || [];

function setStatus(color, text) {
    document.getElementById("statusLine").innerHTML =
        `<span class="dot ${color}"></span>${text}`;
}

async function fetchStatus() {
    try {
        const response = await fetch("https://api.mcsrvstat.us/2/" + serverIP);
        const data = await response.json();

        document.getElementById("version").textContent =
            data.version || "Unknown";

        if (data.online && data.players) {

            const onlinePlayers = Math.floor(data.players.online ?? 0);
            const maxPlayers = Math.floor(data.players.max ?? 0);

            document.getElementById("startButton").style.display = "none";

            if (onlinePlayers > lastPlayerCount) {
                totalJoins += (onlinePlayers - lastPlayerCount);
                localStorage.setItem("dailyJoins", totalJoins);
                document.getElementById("joins").textContent = totalJoins;
            }
            lastPlayerCount = onlinePlayers;

            if (onlinePlayers > peakPlayers) {
                peakPlayers = onlinePlayers;
                localStorage.setItem("peakPlayers", peakPlayers);
                document.getElementById("peak").textContent = peakPlayers;
            }

            if (onlinePlayers === 0) {
                setStatus("yellow", "Server Starting...");
            } else {
                setStatus("green", `Online — ${onlinePlayers}/${maxPlayers} Players`);
            }

            updateLiveChart(onlinePlayers);
            updateHistory(onlinePlayers);

        } else {
            setStatus("red", "Server Offline");
            document.getElementById("startButton").style.display = "inline-block";
            updateLiveChart(0);
            updateHistory(0);
        }

    } catch {
        setStatus("red", "Server Offline");
        updateLiveChart(0);
        updateHistory(0);
    }
}

// LOCAL TIMEZONE SAFE FORMAT
function getLocalTime() {
    return new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
    });
}

// LIVE GRAPH
const liveCtx = document.getElementById('liveChart').getContext('2d');
let liveChart = new Chart(liveCtx, {
    type: 'line',
    data: { labels: [], datasets: [{
        label: 'Players Online',
        data: [],
        borderColor: '#4CAF50',
        tension: 0.4,
        fill: false
    }]},
    options: { responsive:true, maintainAspectRatio:false }
});

function updateLiveChart(players) {
    if (liveChart.data.labels.length >= 20) {
        liveChart.data.labels.shift();
        liveChart.data.datasets[0].data.shift();
    }
    liveChart.data.labels.push(getLocalTime());
    liveChart.data.datasets[0].data.push(players);
    liveChart.update();
}

// 24H HISTORY GRAPH
const historyCtx = document.getElementById('historyChart').getContext('2d');
let historyChart = new Chart(historyCtx, {
    type: 'line',
    data: { labels: [], datasets: [{
        label: 'Players (24h)',
        data: [],
        borderColor: '#90caf9',
        tension: 0.3,
        fill: false
    }]},
    options: { responsive:true, maintainAspectRatio:false }
});

function updateHistory(players) {
    const timestamp = Date.now();

    historyData.push({ time: timestamp, players: players });

    // Keep last 24 hours only
    historyData = historyData.filter(entry =>
        timestamp - entry.time <= 86400000
    );

    localStorage.setItem("historyData", JSON.stringify(historyData));

    historyChart.data.labels =
        historyData.map(entry =>
            new Date(entry.time).toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            })
        );

    historyChart.data.datasets[0].data =
        historyData.map(entry => entry.players);

    historyChart.update();
}

function copyIP() {
    navigator.clipboard.writeText(serverIP);
    alert("Server IP copied!");
}

fetchStatus();
setInterval(fetchStatus, 10000);
</script>

</body>
</html>
