<!DOCTYPE html>
<html>
<head>
  <title>Vanilla Minecraft Server</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 20px;
    }

    .status {
      font-size: 18px;
      margin-bottom: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #5865F2;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>Vanilla Minecraft Server</h1>

<div class="card">
  <div id="status" class="status">Checking server...</div>
  <div id="players"></div>

  <p><strong>IP:</strong> <span id="serverIP">vanillaminecraftsrv.falixsrv.me</span></p>
  <button onclick="copyIP()" id="copyBtn">Copy IP</button>

  <br>
  <a href="https://discord.gg/UUBn2u6X" target="_blank">Join Discord</a>

  <canvas id="playerChart"></canvas>
</div>

<script>
const serverIP = "vanillaminecraftsrv.falixsrv.me";
const ctx = document.getElementById('playerChart');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Players Online',
      data: [],
      borderColor: '#00ffcc',
      tension: 0.3
    }]
  },
  options: {
    scales: {
      y: {
        beginAtZero: true
      }
    }
  }
});

async function updateStatus() {
  try {
    const response = await fetch(`https://api.mcstatus.io/v2/status/java/${serverIP}`);
    const data = await response.json();

    if (data.online) {
      document.getElementById("status").innerHTML = "Server Online";
      document.getElementById("players").innerHTML =
        `${data.players.online} / ${data.players.max} Players Online`;

      const time = new Date().toLocaleTimeString();

      chart.data.labels.push(time);
      chart.data.datasets[0].data.push(data.players.online);

      if (chart.data.labels.length > 10) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
      }

      chart.update();
    } else {
      document.getElementById("status").innerHTML = "Server Offline";
      document.getElementById("players").innerHTML = "";
    }
  } catch (error) {
    document.getElementById("status").innerHTML = "Error fetching status";
  }
}

function copyIP() {
  const ip = document.getElementById("serverIP").innerText;
  navigator.clipboard.writeText(ip);

  const btn = document.getElementById("copyBtn");
  btn.innerText = "Copied!";
  btn.style.background = "#3b82f6";

  setTimeout(() => {
    btn.innerText = "Copy IP";
    btn.style.background = "#22c55e";
  }, 2000);
}

updateStatus();
setInterval(updateStatus, 30000);
</script>

</body>
</html>
