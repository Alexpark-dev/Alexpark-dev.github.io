<!DOCTYPE html>
<html>
<head>
    <title>Vanilla Minecraft Server</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e234f, #11142b);
    color: white;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 40px 20px;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    margin-bottom: 30px;
}

h1 {
    color: #4CAF50;
}

.status-line {
    font-size: 20px;
    margin: 20px 0;
}

.dot {
    height: 14px;
    width: 14px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    animation: pulse 1.5s infinite;
}

.green { background-color: #4CAF50; box-shadow: 0 0 10px #4CAF50; }
.red { background-color: #f44336; box-shadow: 0 0 10px #f44336; }
.yellow { background-color: #ff9800; box-shadow: 0 0 10px #ff9800; }

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
}

button {
    padding: 12px 24px;
    font-size: 16px;
    cursor: pointer;
    margin: 8px;
    border: none;
    border-radius: 8px;
    transition: 0.2s ease;
}

.copy-btn {
    background-color: #4CAF50;
    color: white;
}

.start-btn {
    background-color: #ff9800;
    color: white;
}

button:hover {
    transform: scale(1.05);
}

.record {
    margin-top: 10px;
    color: gold;
    font-size: 18px;
}

.join-counter {
    margin-top: 5px;
    color: #90caf9;
    font-size: 16px;
}

.player-list {
    margin-top: 20px;
    text-align: left;
    display: inline-block;
}

.player-list h3 {
    margin-bottom: 8px;
}

.chart-wrapper {
    height: 260px;
}

footer {
    text-align: center;
    padding: 20px;
    color: #aaa;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Vanilla Minecraft Server</h1>

<p><strong>Server IP:</strong> vanillaminecraftsrv.falixsrv.me</p>

<button class="copy-btn" onclick="copyIP()">Copy IP</button>

<a id="startButton"
   href="https://falixnodes.net/startserver?ip=vanillaminecraftsrv.falixsrv.me"
   target="_blank"
   rel="noopener noreferrer">
    <button class="start-btn">Start the Server</button>
</a>

<div class="status-line" id="statusLine">
    Checking server status...
</div>

<div class="record">
🏆 Peak Players: <span id="peak">0</span>
</div>

<div class="join-counter">
📈 Total Joins: <span id="joins">0</span>
</div>

<div class="player-list" id="playerList"></div>

</div>

<div class="card">
<div class="chart-wrapper">
<canvas id="playerChart"></canvas>
</div>
</div>

</div>

<footer>
© 2026 Vanilla Minecraft Server
</footer>

<script>
const serverIP = "vanillaminecraftsrv.falixsrv.me";

let zeroPlayerTimer = 0;
const zeroLimit = 30000;

let peakPlayers = localStorage.getItem("peakPlayers") || 0;
let totalJoins = localStorage.getItem("totalJoins") || 0;
let lastPlayerCount = 0;

document.getElementById("peak").textContent = peakPlayers;
document.getElementById("joins").textContent = totalJoins;

function setStatus(colorClass, text) {
    document.getElementById("statusLine").innerHTML =
        `<span class="dot ${colorClass}"></span>${text}`;
}

async function fetchStatus() {
    try {
        const response = await fetch("https://api.mcsrvstat.us/2/" + serverIP);
        const data = await response.json();

        if (data.online === true && data.players) {

            const onlinePlayers = Math.floor(data.players.online ?? 0);
            const maxPlayers = Math.floor(data.players.max ?? 0);

            // Hide start button if online
            document.getElementById("startButton").style.display = "none";

            // Track joins
            if (onlinePlayers > lastPlayerCount) {
                totalJoins += (onlinePlayers - lastPlayerCount);
                localStorage.setItem("totalJoins", totalJoins);
                document.getElementById("joins").textContent = totalJoins;
            }
            lastPlayerCount = onlinePlayers;

            // Peak tracker
            if (onlinePlayers > peakPlayers) {
                peakPlayers = onlinePlayers;
                localStorage.setItem("peakPlayers", peakPlayers);
                document.getElementById("peak").textContent = peakPlayers;
            }

            // Sleep detection
            if (onlinePlayers === 0) {
                zeroPlayerTimer += 10000;

                if (zeroPlayerTimer >= zeroLimit) {
                    setStatus("red", "Server Sleeping");
                    document.getElementById("startButton").style.display = "inline-block";
                    updateChart(0);
                    document.getElementById("playerList").innerHTML = "";
                    return;
                }

                setStatus("yellow", "Server Starting...");
            } else {
                zeroPlayerTimer = 0;
                setStatus("green", `Online — ${onlinePlayers}/${maxPlayers} Players`);
            }

            updateChart(onlinePlayers);

            // Player List
            if (data.players.list && data.players.list.length > 0) {
                let listHTML = "<h3>Online Players:</h3><ul>";
                data.players.list.forEach(player => {
                    listHTML += `<li>${player}</li>`;
                });
                listHTML += "</ul>";
                document.getElementById("playerList").innerHTML = listHTML;
            } else {
                document.getElementById("playerList").innerHTML = "";
            }

        } else {
            zeroPlayerTimer = 0;
            setStatus("red", "Server Offline");
            document.getElementById("startButton").style.display = "inline-block";
            document.getElementById("playerList").innerHTML = "";
            updateChart(0);
        }

    } catch {
        setStatus("red", "Server Offline");
        document.getElementById("startButton").style.display = "inline-block";
        document.getElementById("playerList").innerHTML = "";
        updateChart(0);
    }
}

function copyIP() {
    navigator.clipboard.writeText(serverIP);
    alert("Server IP copied!");
}

const ctx = document.getElementById('playerChart').getContext('2d');

let playerChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Players Online',
            data: [],
            borderColor: '#4CAF50',
            backgroundColor: 'rgba(76,175,80,0.15)',
            tension: 0.4,
            fill: true
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 400 },
        scales: {
            y: {
                min: 0,
                suggestedMax: 3,
                ticks: { color: "white", stepSize: 1 }
            },
            x: {
                ticks: { color: "white" }
            }
        },
        plugins: {
            legend: {
                labels: { color: "white" }
            }
        }
    }
});

function updateChart(playerCount) {
    const time = new Date().toLocaleTimeString();

    if (playerChart.data.labels.length >= 20) {
        playerChart.data.labels.shift();
        playerChart.data.datasets[0].data.shift();
    }

    playerChart.data.labels.push(time);
    playerChart.data.datasets[0].data.push(playerCount);
    playerChart.update();
}

fetchStatus();
setInterval(fetchStatus, 10000);
</script>

</body>
</html>
