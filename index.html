<!DOCTYPE html>
<html>
<head>
  <title>Vanilla MInecraft Server</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
    }

    canvas {
      margin-top: 20px;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #5865F2;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Vanilla MC Server</h1>

<div class="card">
  <div id="status">Checking server...</div>
  <div id="players"></div>
  <p><strong>IP:</strong> vanillaminecraftsrv.falixsrv.me</p>
  <a href="" target="_blank">Join Discord</a>

  <canvas id="playerChart">https://discord.gg/UUBn2u6X</canvas>
</div>

<script>
const serverIP = "vanillaminecraftsrv.falixsrv.me";
const ctx = document.getElementById('playerChart');
let playerHistory = [];

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Players Online',
      data: [],
      borderColor: '#00ffcc',
      tension: 0.3
    }]
  },
  options: {
    scales: {
      y: {
        beginAtZero: true
      }
    }
  }
});

async function updateStatus() {
  try {
    const response = await fetch(`https://api.mcstatus.io/v2/status/java/${serverIP}`);
    const data = await response.json();

    if (data.online) {
      document.getElementById("status").innerHTML = "🟢 Server Online";
      document.getElementById("players").innerHTML =
        `${data.players.online} / ${data.players.max} Players`;

      const time = new Date().toLocaleTimeString();

      chart.data.labels.push(time);
      chart.data.datasets[0].data.push(data.players.online);

      if (chart.data.labels.length > 10) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
      }

      chart.update();
    } else {
      document.getElementById("status").innerHTML = "🔴 Server Offline";
      document.getElementById("players").innerHTML = "";
    }
  } catch (error) {
    document.getElementById("status").innerHTML = "⚠️ Error fetching status";
  }
}

updateStatus();
setInterval(updateStatus, 30000);
</script>

</body>
</html>
