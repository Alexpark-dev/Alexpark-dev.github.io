<!DOCTYPE html>
<html>
<head>
    <title>Vanilla Minecraft Server</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvqIyQ1oC4phgc9E_7KWUikh_yr9JdsvWpcw&s">
    <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvqIyQ1oC4phgc9E_7KWUikh_yr9JdsvWpcw&s">
    <link rel="apple-touch-icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvqIyQ1oC4phgc9E_7KWUikh_yr9JdsvWpcw&s">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
            background-color: #1e1e1e;
            color: white;
        }

        h1 {
            font-size: 40px;
            color: #4CAF50;
        }

        .status-box {
            font-size: 22px;
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            background-color: #45a049;
        }

        a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .rules {
            margin-top: 40px;
            font-size: 16px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }

        canvas {
            margin-top: 40px;
        }
    </style>
</head>

<body>

<h1>Vanilla Minecraft Server</h1>

<p><strong>Server IP:</strong> vanillaminecraftsrv.falixsrv.me</p>
<button onclick="copyIP()">Copy IP</button>

<div class="status-box">
    <p id="status">Checking server status...</p>
    <p><strong>Version:</strong> (most recent version)4</p>
</div>

<p>
    <a href="https://discord.gg/UUBn2u6X" target="_blank">
        Join Our Discord
    </a>
</p>

<canvas id="playerChart" width="400" height="200"></canvas>

<div class="rules">
    <h2>Rules:</h2>
    <ol>
        <li>No griefing or stealing</li>
        <li>No hacks or cheats</li>
        <li>No PvP without consent from the other player</li>
        <li>No spamming or advertising</li>
    </ol>
</div>

<script>
const serverIP = "vanillaminecraftsrv.falixsrv.me";

async function fetchStatus() {
    try {
        const response = await fetch(`https://api.mcsrvstat.us/2/${serverIP}`);
        const data = await response.json();

        if (data.online) {
            document.getElementById("status").innerHTML =
                "Server is ONLINE<br>Players: " + data.players.online + "/" + data.players.max;

            updateChart(data.players.online);
        } else {
            document.getElementById("status").innerHTML = "Server is OFFLINE";
        }
    } catch (error) {
        document.getElementById("status").innerHTML = "Error checking server.";
    }
}

function copyIP() {
    navigator.clipboard.writeText(serverIP);
    alert("Server IP copied!");
}

const ctx = document.getElementById('playerChart').getContext('2d');
let playerChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Players Online',
            data: [],
            borderColor: '#4CAF50',
            borderWidth: 2,
            fill: false
        }]
    },
    options: {
        scales: {
            y: {
                beginAtZero: true,
                ticks: { color: "white" }
            },
            x: {
                ticks: { color: "white" }
            }
        },
        plugins: {
            legend: {
                labels: { color: "white" }
            }
        }
    }
});

function updateChart(playerCount) {
    const time = new Date().toLocaleTimeString();

    if (playerChart.data.labels.length > 10) {
        playerChart.data.labels.shift();
        playerChart.data.datasets[0].data.shift();
    }

    playerChart.data.labels.push(time);
    playerChart.data.datasets[0].data.push(playerCount);
    playerChart.update();
}

fetchStatus();
setInterval(fetchStatus, 30000);
</script>

</body>
</html>
