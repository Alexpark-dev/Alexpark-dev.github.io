<!DOCTYPE html>
<html>
<head>
    <title>Vanilla Minecraft Server</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/webp" href="https://static.planetminecraft.com/files/image/minecraft/texture-pack/2021/709/14376136-pack_xl.webp">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #1e234f;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 36px;
            color: #4CAF50;
        }

        .status-box {
            font-size: 20px;
            margin: 25px 0;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .chart-wrapper {
            margin-top: 40px;
            height: 250px;
        }

        footer {
            background-color: #212229;
            padding: 35px 20px;
            text-align: center;
            font-size: 14px;
            color: #bbb;
        }

        footer strong {
            color: #4CAF50;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Vanilla Minecraft Server</h1>

<p><strong>Server IP:</strong> vanillaminecraftsrv.falixsrv.me</p>
<button onclick="copyIP()">Copy IP</button>

<div class="status-box">
    <p id="status">Checking server status...</p>
    <p><strong>Version:</strong> Most Recent Version</p>
</div>

<div class="chart-wrapper">
    <canvas id="playerChart"></canvas>
</div>

</div>

<footer>
    <p><strong>Vanilla Minecraft Server</strong> — A community-focused survival experience.</p>
    <p>© 2026 Vanilla Minecraft Server. All rights reserved.</p>
</footer>

<script>
const serverIP = "vanillaminecraftsrv.falixsrv.me";

async function fetchStatus() {
    try {
        const response = await fetch("https://api.mcsrvstat.us/2/" + serverIP);
        const data = await response.json();

        const online = data.online === true;
        const hasPlayers = data.players && typeof data.players.online === "number";
        const validMax = data.players && data.players.max > 0;
        const hasMotd = data.motd && data.motd.clean;

        if (online && hasPlayers && validMax && hasMotd) {

            const onlinePlayers = Math.floor(data.players.online);
            const maxPlayers = Math.floor(data.players.max);

            document.getElementById("status").innerHTML =
                "<span style='color:#4CAF50;'>● ONLINE</span><br>Players: "
                + onlinePlayers + "/" + maxPlayers;

            updateChart(onlinePlayers);

        } else {
            document.getElementById("status").innerHTML =
                "<span style='color:red;'>● OFFLINE</span>";
        }

    } catch (error) {
        document.getElementById("status").innerHTML =
            "<span style='color:red;'>● OFFLINE</span>";
    }
}

function copyIP() {
    navigator.clipboard.writeText(serverIP);
    alert("Server IP copied!");
}

const ctx = document.getElementById('playerChart').getContext('2d');

let playerChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Players Online',
            data: [],
            borderColor: '#4CAF50',
            borderWidth: 2,
            fill: false
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
            y: {
                beginAtZero: true,
                min: 0,
                suggestedMax: 3,
                ticks: {
                    color: "white",
                    stepSize: 1
                }
            },
            x: {
                ticks: { color: "white" }
            }
        },
        plugins: {
            legend: {
                labels: { color: "white" }
            }
        }
    }
});

function updateChart(playerCount) {
    const time = new Date().toLocaleTimeString();

    if (playerChart.data.labels.length > 10) {
        playerChart.data.labels.shift();
        playerChart.data.datasets[0].data.shift();
    }

    playerChart.data.labels.push(time);
    playerChart.data.datasets[0].data.push(playerCount);
    playerChart.update();
}

fetchStatus();
setInterval(fetchStatus, 30000);
</script>

</body>
</html>
