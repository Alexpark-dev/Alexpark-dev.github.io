<!DOCTYPE html>
<html>
<head>
<title>Vanilla Minecraft Server</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#1e234f;
    color:white;
}

.container {
    max-width:1100px;
    margin:auto;
    padding:30px 15px;
    text-align:center;
}

.card {
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:15px;
    margin-bottom:25px;
}

h1 { color:#4CAF50; }

.status-line { font-size:20px; margin:15px 0; }

.dot {
    height:14px;
    width:14px;
    border-radius:50%;
    display:inline-block;
    margin-right:8px;
    animation:pulse 1.5s infinite;
}

.green { background:#4CAF50; box-shadow:0 0 10px #4CAF50; }
.red { background:#f44336; box-shadow:0 0 10px #f44336; }
.yellow { background:#ff9800; box-shadow:0 0 10px #ff9800; }

@keyframes pulse {
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

button {
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    margin:8px;
    transition:0.2s;
}

button:hover { transform:scale(1.05); }

.copy-btn { background:#4CAF50;color:white; }
.start-btn { background:#ff9800;color:white; }

.chart-wrapper { height:260px; }

.player-list {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.player-card {
    background:rgba(255,255,255,0.08);
    padding:10px 15px;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:10px;
}

.player-card img {
    width:40px;
    height:40px;
    border-radius:6px;
}

footer {
    background:#212229;
    padding:20px;
    font-size:14px;
    color:#aaa;
    margin-top:30px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Vanilla Minecraft Server</h1>

<p><strong>Server IP:</strong> vanillaminecraftsrv.falixsrv.me</p>
<p><strong>Version:</strong> <span id="version">Loading...</span></p>

<button class="copy-btn" onclick="copyIP()">Copy IP</button>

<a id="startButton"
href="https://falixnodes.net/startserver?ip=vanillaminecraftsrv.falixsrv.me"
target="_blank" rel="noopener noreferrer">
<button class="start-btn">Start the Server</button>
</a>

<div class="status-line" id="statusLine">
Checking server status...
</div>

<p> Peak Players: <span id="peak">0</span></p>
<p> Daily Joins: <span id="joins">0</span></p>
</div>

<div class="card">
<h3>Live Player Graph</h3>
<div class="chart-wrapper">
<canvas id="liveChart"></canvas>
</div>
</div>

<div class="card">
<h3>24 Hour History</h3>
<div class="chart-wrapper">
<canvas id="historyChart"></canvas>
</div>
</div>

<div class="card">
<h3>Players Online</h3>
<div id="playerList" class="player-list">
Loading players...
</div>
</div>

<div class="card">
<h3>Live Chat</h3>
<iframe 
src="https://discord.com/widget?id=Vanilla_Mc_Server&theme=dark"
width="100%" 
height="400"
frameborder="0">
</iframe>
</div>

</div>

<footer>
© 2026 Vanilla Minecraft Server
</footer>

<script>
const serverIP = "vanillaminecraftsrv.falixsrv.me";

let peakPlayers = parseInt(localStorage.getItem("peakPlayers")) || 0;
let totalJoins = parseInt(localStorage.getItem("dailyJoins")) || 0;
let lastPlayerCount = 0;
let savedVersion = localStorage.getItem("serverVersion") || "Unknown";

document.getElementById("peak").textContent = peakPlayers;
document.getElementById("joins").textContent = totalJoins;
document.getElementById("version").textContent = savedVersion;

let historyData = JSON.parse(localStorage.getItem("historyData")) || [];

function setStatus(color,text){
document.getElementById("statusLine").innerHTML =
`<span class="dot ${color}"></span>${text}`;
}

async function fetchStatus(){
try{
const response = await fetch("https://api.mcsrvstat.us/2/"+serverIP);
const data = await response.json();

if(data.version){
savedVersion = data.version;
localStorage.setItem("serverVersion", savedVersion);
document.getElementById("version").textContent = savedVersion;
}

if(data.online && data.players){

const onlinePlayers = Math.max(0,Math.floor(data.players.online||0));
const maxPlayers = Math.max(0,Math.floor(data.players.max||0));

document.getElementById("startButton").style.display="none";

if(onlinePlayers>lastPlayerCount){
totalJoins += (onlinePlayers-lastPlayerCount);
localStorage.setItem("dailyJoins",totalJoins);
document.getElementById("joins").textContent=totalJoins;
}

lastPlayerCount=onlinePlayers;

if(onlinePlayers>peakPlayers){
peakPlayers=onlinePlayers;
localStorage.setItem("peakPlayers",peakPlayers);
document.getElementById("peak").textContent=peakPlayers;
}

if(onlinePlayers===0){
setStatus("yellow","Server Starting...");
}else{
setStatus("green",`Online — ${onlinePlayers}/${maxPlayers} Players`);
}

updateLiveChart(onlinePlayers);
updateHistory(onlinePlayers);

const playerListDiv=document.getElementById("playerList");

if(data.players.list && data.players.list.length>0){
playerListDiv.innerHTML="";
data.players.list.forEach(player=>{
const card=document.createElement("div");
card.className="player-card";
card.innerHTML=`
<img src="https://mc-heads.net/avatar/${player}/40">
<span>${player}</span>
`;
playerListDiv.appendChild(card);
});
}else{
playerListDiv.innerHTML="No players online.";
}

}else{
setStatus("red","Server Offline");
document.getElementById("startButton").style.display="inline-block";
updateLiveChart(0);
updateHistory(0);
document.getElementById("playerList").innerHTML="Server Offline";
}

}catch{
setStatus("red","Server Offline");
updateLiveChart(0);
updateHistory(0);
}
}

function getLocalTime(){
return new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});
}

const liveChart=new Chart(document.getElementById("liveChart"),{
type:'line',
data:{labels:[],datasets:[{
label:'Players Online',
data:[],
borderColor:'#4CAF50',
tension:0.2,
fill:false
}]},
options:{
responsive:true,
maintainAspectRatio:false,
scales:{
y:{beginAtZero:true,min:0,ticks:{stepSize:1,precision:0}}
}
}
});

function updateLiveChart(players){
if(liveChart.data.labels.length>=20){
liveChart.data.labels.shift();
liveChart.data.datasets[0].data.shift();
}
liveChart.data.labels.push(getLocalTime());
liveChart.data.datasets[0].data.push(players);
liveChart.update();
}

const historyChart=new Chart(document.getElementById("historyChart"),{
type:'line',
data:{labels:[],datasets:[{
label:'Players (24h)',
data:[],
borderColor:'#90caf9',
tension:0.2,
fill:false
}]},
options:{
responsive:true,
maintainAspectRatio:false,
scales:{
y:{beginAtZero:true,min:0,ticks:{stepSize:1,precision:0}}
}
}
});

function updateHistory(players){
const timestamp=Date.now();
historyData.push({time:timestamp,players});
historyData=historyData.filter(e=>timestamp-e.time<=86400000);
localStorage.setItem("historyData",JSON.stringify(historyData));

historyChart.data.labels=
historyData.map(e=>new Date(e.time).toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
}));

historyChart.data.datasets[0].data=
historyData.map(e=>e.players);

historyChart.update();
}

function copyIP(){
navigator.clipboard.writeText(serverIP);
alert("Server IP copied!");
}

fetchStatus();
setInterval(fetchStatus,30000);
</script>

</body>
</html>
